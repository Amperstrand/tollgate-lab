# Physical lab environment — all connected devices
#
# Usage: pytest --lg-env=environments/physical-lab.yaml tests/
#
# Each target is a physical device accessible from the test machine.

targets:
  router-alpha:
    role: host
    name: GL-MT3000 Alpha (primary router)
    params:
      ssh_host: "192.168.13.112"
      ssh_user: "root"

  router-beta:
    role: host
    name: GL-MT3000 Beta (upstream router)
    params:
      ssh_host: "100.90.216.248"
      ssh_user: "root"

  esp32-d0wd:
    role: child
    name: ESP32-D0WD on /dev/ttyUSB0
    params:
      serial_port: "/dev/ttyUSB0"
      chip: "esp32"
      flash_tool: "esptool"

  linux-host:
    role: host
    name: Test controller (ai-legion-small)
    params:
      ssh_host: "127.0.0.1"
      ssh_user: "ubuntu"
      ble_adapter: "hci0"

  macbook:
    role: host
    name: MacBook (BLE test peer)
    params:
      local_shell: true
      ble_adapter: "default"
