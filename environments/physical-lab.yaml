# Physical lab environment — all connected devices
# Usage: pytest --lg-env=environments/physical-lab.yaml tests/
#
# Labgrid schema follows: https://labgrid.readthedocs.io/en/latest/configuration.html

targets:
  router-alpha:
    resources:
      NetworkService:
        address: "192.168.13.112"
        username: "root"
    drivers:
      SSHDriver:
        keyfile: ""

  router-beta:
    resources:
      NetworkService:
        address: "100.90.216.248"
        username: "root"
    drivers:
      SSHDriver:
        keyfile: ""

  esp32-d0wd:
    resources:
      RawSerialPort:
        port: "/dev/ttyUSB0"
        speed: 115200
    drivers:
      SerialDriver: {}

  linux-host:
    resources:
      NetworkService:
        address: "127.0.0.1"
        username: "ubuntu"
    drivers:
      SSHDriver: {}

  fips-macbook:
    resources:
      NetworkService:
        address: "192.168.13.243"
        username: "user"
    drivers:
      SSHDriver: {}
